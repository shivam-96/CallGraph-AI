<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CallGraph AI — Voice Agent</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>CallGraph AI</h1>
            <div id="status" class="status disconnected">Disconnected</div>
        </header>

        <main>
            <!-- Conversation transcript -->
            <div id="transcript-area">
                <div id="messages"></div>
            </div>

            <!-- Push-to-talk button -->
            <div id="controls">
                <button id="talk-btn" disabled>
                    <span id="btn-icon">🎤</span>
                    <span id="btn-text">Hold to Talk</span>
                </button>
                <div id="timing-info"></div>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
